
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.roadmap{padding:1rem 0}
.week-header{display:flex;align-items:center;gap:12px;margin:2rem 0 1rem}
.week-badge{background:#E6F1FB;color:#0C447C;font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;white-space:nowrap}
.week-title{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.week-outcome{font-size:13px;color:var(--color-text-secondary);margin-left:auto;white-space:nowrap}
.days-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(0,1fr));gap:8px;margin-bottom:8px}
.day-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;cursor:pointer;transition:border-color 0.15s}
.day-card:hover{border-color:var(--color-border-secondary)}
.day-card.active{border-color:#378ADD;border-width:1.5px}
.day-num{font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px}
.day-task{font-size:13px;color:var(--color-text-primary);line-height:1.4}
.detail-panel{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.25rem;margin:12px 0 0}
.detail-panel h3{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:12px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-section label{font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px}
.detail-section p{font-size:13px;color:var(--color-text-secondary);line-height:1.5}
.resource-link{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:#185FA5;text-decoration:none}
.resource-link:hover{text-decoration:underline}
.milestone-bar{display:flex;align-items:center;gap:8px;margin-top:1rem;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary)}
.milestone-icon{font-size:18px;color:#0C447C}
.milestone-text{font-size:13px;color:var(--color-text-secondary)}
.milestone-text strong{color:var(--color-text-primary);font-weight:500}
.final-card{background:#E6F1FB;border:0.5px solid #B5D4F4;border-radius:var(--border-radius-lg);padding:1.25rem;margin-top:2rem;display:flex;align-items:center;gap:16px}
.final-icon{font-size:28px;color:#0C447C}
.final-text h3{font-size:15px;font-weight:500;color:#0C447C;margin-bottom:4px}
.final-text p{font-size:13px;color:#185FA5}
.tag{display:inline-block;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;padding:2px 8px;border-radius:20px;margin:2px}
.week-divider{height:0.5px;background:var(--color-border-tertiary);margin:0.5rem 0}
</style>

<h2 class="sr-only">30-day web development learning roadmap for intermediate beginners</h2>

<div class="roadmap" id="app"></div>

<script>
const weeks = [
  {
    num: 1,
    title: "HTML & CSS Mastery",
    outcome: "Build pixel-perfect static pages",
    color: "#E1F5EE",
    textColor: "#085041",
    borderColor: "#9FE1CB",
    days: [
      { task: "HTML5 semantics & structure", resource: "MDN HTML Guide", url: "https://developer.mozilla.org/en-US/docs/Learn/HTML", project: "Blog post layout", tip: "Focus on semantic tags: header, nav, main, article, footer. Avoid div-soup." },
      { task: "CSS Box model & selectors", resource: "CSS Tricks Box Model", url: "https://css-tricks.com/the-css-box-model/", project: "Style the blog", tip: "Draw the box model on paper. Understand margin vs padding vs border." },
      { task: "Flexbox layouts", resource: "Flexbox Froggy", url: "https://flexboxfroggy.com/", project: "Navbar component", tip: "Play Flexbox Froggy fully. It's the fastest way to internalize flex." },
      { task: "CSS Grid", resource: "Grid Garden", url: "https://cssgridgarden.com/", project: "Portfolio grid layout", tip: "Grid for 2D layouts, Flexbox for 1D. Use both — they're complementary." },
      { task: "Responsive design & media queries", resource: "Kevin Powell on YouTube", url: "https://www.youtube.com/@KevinPowell", project: "Make day 4 project responsive", tip: "Design mobile-first. Start with min-width breakpoints." },
      { task: "CSS animations & transitions", resource: "MDN Animations", url: "https://developer.mozilla.org/en-US/docs/Web/CSS/animation", project: "Animated button hover effects", tip: "Use transition for simple state changes, animation for keyframe sequences." },
      { task: "Mini project: Landing page", resource: "Dribbble for inspiration", url: "https://dribbble.com/", project: "Full landing page", tip: "Recreate a real landing page from scratch. Compare and iterate." },
    ]
  },
  {
    num: 2,
    title: "JavaScript Foundations",
    outcome: "Write logic & DOM interactions",
    color: "#FAEEDA",
    textColor: "#633806",
    borderColor: "#FAC775",
    days: [
      { task: "Variables, types & functions", resource: "javascript.info", url: "https://javascript.info/first-steps", project: "Calculator logic (no UI)", tip: "Understand let vs const vs var. Default to const." },
      { task: "Arrays & objects", resource: "javascript.info objects", url: "https://javascript.info/object", project: "Student grade tracker", tip: "Arrays for ordered lists, objects for key-value data. Master map/filter/reduce." },
      { task: "DOM manipulation", resource: "The Odin Project JS DOM", url: "https://www.theodinproject.com/lessons/foundations-dom-manipulation-and-events", project: "To-do list (no framework)", tip: "querySelector and addEventListener are 80% of what you need." },
      { task: "Events & forms", resource: "MDN Events", url: "https://developer.mozilla.org/en-US/docs/Learn/JavaScript/Building_blocks/Events", project: "Contact form with validation", tip: "Understand event bubbling. Use preventDefault() for forms." },
      { task: "Fetch API & JSON", resource: "javascript.info fetch", url: "https://javascript.info/fetch", project: "Show weather data from API", tip: "Always handle errors in fetch with .catch() or try/catch." },
      { task: "ES6+: arrow funcs, destructuring", resource: "javascript.info modern JS", url: "https://javascript.info/", project: "Refactor week's code to ES6", tip: "Destructuring and spread operators will save you hundreds of lines." },
      { task: "Mini project: Interactive quiz app", resource: "Open Trivia API", url: "https://opentdb.com/api_config.php", project: "Quiz with score tracking", tip: "Fetch questions from the Open Trivia API. Show results at the end." },
    ]
  },
  {
    num: 3,
    title: "React & Tooling",
    outcome: "Build component-driven apps",
    color: "#EEEDFE",
    textColor: "#26215C",
    borderColor: "#CECBF6",
    days: [
      { task: "Node.js, npm & Vite setup", resource: "Vite docs", url: "https://vitejs.dev/guide/", project: "Create React app with Vite", tip: "Learn npm i, npm run dev, and how package.json works." },
      { task: "React components & JSX", resource: "React docs beta", url: "https://react.dev/learn", project: "Decompose landing page into components", tip: "Everything in React is a component. Think in trees." },
      { task: "Props & state (useState)", resource: "React docs: useState", url: "https://react.dev/reference/react/useState", project: "Counter & toggle components", tip: "State = data that changes. Props = data passed in. Keep state as high as needed, no higher." },
      { task: "useEffect & side effects", resource: "React docs: useEffect", url: "https://react.dev/reference/react/useEffect", project: "Fetch + display GitHub user profile", tip: "Cleanup your effects. Empty dep array = run once on mount." },
      { task: "React Router (navigation)", resource: "React Router docs", url: "https://reactrouter.com/en/main", project: "Multi-page portfolio site", tip: "Learn BrowserRouter, Route, Link, and useParams." },
      { task: "Tailwind CSS with React", resource: "Tailwind docs", url: "https://tailwindcss.com/docs/installation", project: "Restyle portfolio with Tailwind", tip: "Use Tailwind's utility classes. Avoid writing custom CSS alongside it." },
      { task: "Mini project: GitHub profile finder", resource: "GitHub REST API", url: "https://docs.github.com/en/rest/users/users", project: "Search + display GitHub users", tip: "Debounce the search input. Handle loading and error states." },
    ]
  },
  {
    num: 4,
    title: "Backend & Deployment",
    outcome: "Ship a full-stack project live",
    color: "#FAECE7",
    textColor: "#4A1B0C",
    borderColor: "#F5C4B3",
    days: [
      { task: "Node.js & Express basics", resource: "Express docs", url: "https://expressjs.com/en/starter/hello-world.html", project: "REST API with 3 routes", tip: "Understand req, res, and middleware. Use Postman to test routes." },
      { task: "REST API design & routing", resource: "REST API tutorial", url: "https://restapitutorial.com/", project: "CRUD API for a notes app", tip: "Follow REST conventions: GET, POST, PUT, DELETE on resources." },
      { task: "Connecting frontend to backend", resource: "Axios docs", url: "https://axios-http.com/docs/intro", project: "React app + Express API", tip: "Use environment variables for API URLs. Handle CORS on the server." },
      { task: "Git & GitHub workflow", resource: "Git Handbook", url: "https://guides.github.com/introduction/git-handbook/", project: "Push all projects to GitHub", tip: "Commit often with meaningful messages. Use branches for features." },
      { task: "Deploy frontend (Vercel)", resource: "Vercel docs", url: "https://vercel.com/docs", project: "Deploy portfolio to Vercel", tip: "Connect your GitHub repo. Vercel auto-deploys on every push." },
      { task: "Deploy backend (Render)", resource: "Render docs", url: "https://render.com/docs/deploy-node-express-app", project: "Deploy API to Render", tip: "Set environment variables in Render dashboard. Free tier is enough." },
      { task: "Final project: Full-stack notes app", resource: "All of the above", url: "https://github.com/", project: "Notes app live on the internet", tip: "Polish the UI, handle edge cases, and add to your portfolio README." },
    ]
  }
];

let activeWeek = 0;
let activeDay = 0;

function render() {
  const app = document.getElementById('app');
  let html = '';

  weeks.forEach((week, wi) => {
    html += `<div class="week-header">
      <span class="week-badge">Week ${week.num}</span>
      <span class="week-title">${week.task || week.title}</span>
      <span class="week-outcome">${week.outcome}</span>
    </div>`;

    html += `<div class="days-grid">`;
    week.days.forEach((day, di) => {
      const dayNum = wi * 7 + di + 1;
      const isActive = wi === activeWeek && di === activeDay;
      html += `<div class="day-card${isActive ? ' active' : ''}" onclick="select(${wi},${di})">
        <div class="day-num">Day ${dayNum}</div>
        <div class="day-task">${day.task}</div>
      </div>`;
    });
    html += `</div>`;

    if (wi === activeWeek) {
      const d = week.days[activeDay];
      const dayNum = wi * 7 + activeDay + 1;
      html += `<div class="detail-panel">
        <h3>Day ${dayNum} — ${d.task}</h3>
        <div class="detail-grid">
          <div class="detail-section">
            <label>Today's project</label>
            <p>${d.project}</p>
          </div>
          <div class="detail-section">
            <label>Resource</label>
            <p><a class="resource-link" href="${d.url}" target="_blank"><i class="ti ti-external-link" aria-hidden="true"></i>${d.resource}</a></p>
          </div>
          <div class="detail-section" style="grid-column:1/-1">
            <label>Pro tip</label>
            <p>${d.tip}</p>
          </div>
        </div>
        <div class="milestone-bar">
          <i class="ti ti-flag milestone-icon" aria-hidden="true"></i>
          <span class="milestone-text"><strong>Week ${week.num} milestone:</strong> ${week.outcome}</span>
        </div>
      </div>`;
    }

    if (wi < weeks.length - 1) {
      html += `<div class="week-divider" style="margin-top:1rem"></div>`;
    }
  });

  html += `<div class="final-card">
    <i class="ti ti-rocket final-icon" aria-hidden="true"></i>
    <div class="final-text">
      <h3>Day 30 outcome — you're a web developer</h3>
      <p>Live portfolio · Full-stack notes app · GitHub profile · Ready to apply for junior roles or freelance</p>
    </div>
  </div>`;

  app.innerHTML = html;
}

window.select = function(wi, di) {
  activeWeek = wi;
  activeDay = di;
  render();
};

render();
</script>
